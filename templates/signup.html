<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup - Expense Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1A2A6C, #00C9A7);
            font-family: 'Poppins', sans-serif;
        }
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }
        .auth-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        .auth-card h2 { color: #1A2A6C; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { font-weight: 600; }
        .form-group input {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;
        }
        .btn {
            background-color: teal; color: white; border: none;
            padding: 10px; border-radius: 6px; font-weight: bold; width: 100%;
        }
        .btn:hover { background-color: crimson; }
        .switch { margin-top: 15px; }
        .switch a { color: teal; font-weight: bold; text-decoration: none; }
        .switch a:hover { color: crimson; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand">Expense Analyzer</span>
        <a href="{{ url_for('login') }}" class="nav-link text-white">Login</a>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('signup') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <p class="switch">Already have an account?
                <a href="{{ url_for('login') }}">Login here</a>
            </p>
        </div>
    </div>

    <!-- Bootstrap JS for dismissible alerts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
